apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sui-trace.fullname" . }}-api
  labels:
    {{- include "sui-trace.commonLabels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sui-trace.fullname" . }}
      component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sui-trace.fullname" . }}
        component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}/trace-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TRACE__database__url
              valueFrom:
                secretKeyRef:
                  name: {{ include "sui-trace.fullname" . }}-secrets
                  key: databaseUrl
            - name: TRACE__redis__url
              valueFrom:
                secretKeyRef:
                  name: {{ include "sui-trace.fullname" . }}-secrets
                  key: redisUrl
            - name: TRACE__auth__jwt_secret
              valueFrom:
                secretKeyRef:
                  name: {{ include "sui-trace.fullname" . }}-secrets
                  key: jwtSecret
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sui-trace.fullname" . }}-api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "sui-trace.fullname" . }}
    component: api
