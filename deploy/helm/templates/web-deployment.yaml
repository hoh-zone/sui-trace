apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sui-trace.fullname" . }}-web
  labels:
    {{- include "sui-trace.commonLabels" . | nindent 4 }}
    component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sui-trace.fullname" . }}
      component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sui-trace.fullname" . }}
        component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}/trace-web:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sui-trace.fullname" . }}-web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "sui-trace.fullname" . }}
    component: web
